<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | NewsHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">N</div>
        <h2>Admin Panel</h2>
        <p>Sign in to manage your news website</p>
      </div>

      <div class="login-error" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input type="text" id="username" placeholder="admin" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      </form>

      <div style="text-align:center;margin-top:20px">
        <a href="/" style="font-size:13px;color:#999;text-decoration:none">← Back to Website</a>
      </div>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid #eee;font-size:12px;color:#bbb;text-align:center">
        <strong>Demo credentials:</strong> admin / Admin@123<br>
        <em>(Run <code style="background:#f5f5f5;padding:2px 4px;border-radius:3px">npm run seed</code> to create these)</em>
      </div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
